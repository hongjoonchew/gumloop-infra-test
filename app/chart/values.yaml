replicaCount: 2

image:
  repository: app
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

probes:
  liveness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /
    initialDelaySeconds: 2
    periodSeconds: 5

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Set true when this chart is deployed to Fleet-registered GKE clusters
# participating in a Multi-Cluster Gateway. Emits a ServiceExport so the
# workload becomes routable from the config cluster's HTTPRoute.
multiCluster:
  enabled: false

# Attaches a Cloud Armor policy to the Service via BackendConfig.
# Requires multiCluster.enabled=true and a pre-created Cloud Armor policy.
cloudArmor:
  enabled: false
  policyName: ""

metrics:
  enabled: true
  port: 8080
  path: /metrics

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
