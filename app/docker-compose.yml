services:
  app:
    build: .
    image: gumloop-app:local
    container_name: gumloop-app
    ports:
      - "8080:8080"
    environment:
      APP_VERSION: "0.1.0-local"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/', timeout=2).status==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
