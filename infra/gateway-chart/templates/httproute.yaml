apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "gateway.fullname" . }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "gateway.fullname" . }}
  hostnames:
    - {{ .Values.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: net.gke.io
          kind: ServiceImport
          name: {{ .Values.backend.serviceName }}
          port: {{ .Values.backend.port }}
