name: build-deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      cluster:
        description: "GKE cluster to deploy to"
        required: false
        default: "cluster-a"

env:
  PROJECT_ID: gumloop-infra-interview
  REGION: us-central1
  AR_REPO: app
  IMAGE_NAME: app
  GKE_CLUSTER: ${{ github.event.inputs.cluster || 'cluster-a' }}
  GKE_LOCATION: us-central1
  RELEASE_NAME: app
  RELEASE_NAMESPACE: default

permissions:
  contents: read
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gha-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - id: image
        name: Compute image tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          IMAGE="${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}"
          docker build -t "${IMAGE}" ./app
          docker push "${IMAGE}"

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm upgrade --install
        run: |
          helm upgrade --install "${RELEASE_NAME}" ./app/chart \
            --namespace "${RELEASE_NAMESPACE}" \
            --create-namespace \
            --set image.repository="${{ steps.image.outputs.image }}" \
            --set image.tag="${{ steps.image.outputs.tag }}" \
            --wait --timeout 5m

      - name: Verify rollout
        run: |
          kubectl -n "${RELEASE_NAMESPACE}" rollout status \
            deployment/"${RELEASE_NAME}" --timeout=2m
