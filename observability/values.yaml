# VictoriaMetrics cluster: split-role topology.
#   vminsert  -> ingestion (accepts remote_write / Prometheus / InfluxDB)
#   vmstorage -> stateful storage (PVC-backed)
#   vmselect  -> read path (Prometheus-compatible /api/v1/query)
victoria-metrics-cluster:
  vmselect:
    replicaCount: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  vminsert:
    replicaCount: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  vmstorage:
    replicaCount: 2
    retentionPeriod: "7d"
    persistentVolume:
      enabled: true
      size: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

# vmagent scrapes pods annotated with prometheus.io/scrape=true (same
# convention emitted by app/chart when metrics.enabled=true) and forwards
# to the cluster's vminsert service.
vmagent:
  remoteWriteUrls:
    - http://observability-victoria-metrics-cluster-vminsert:8480/insert/0/prometheus/

  config:
    global:
      scrape_interval: 15s
      external_labels:
        cluster: demo
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Only scrape pods that opt-in via annotation.
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # Override metrics path if annotated (default /metrics).
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Rewrite target address to (pod_ip):(annotated_port).
          - source_labels:
              - __address__
              - __meta_kubernetes_pod_annotation_prometheus_io_port
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
